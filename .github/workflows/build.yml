name: Build Hybrid-Mount

on:
  push:
    branches:
      - 'dev'
    paths:
      - 'src/**'
      - 'Cargo.*'
      - 'module/**'
      - 'webui'
      - 'webui/**'
      - 'xtask/**'
      - 'kpm/**'
      - 'build.rs'
      - 'scripts/build-local.sh'
      - '.github/actions/setup-build-env/**'
      - '.github/workflows/build-hymofs-lkm.yml'
      - '.github/workflows/hymofs-lkm.yml'
      - '.github/workflows/build.yml'
  pull_request:
    branches:
      - 'dev'
    paths:
      - 'src/**'
      - 'Cargo.*'
      - 'module/**'
      - 'webui'
      - 'webui/**'
      - 'xtask/**'
      - 'kpm/**'
      - 'build.rs'
      - 'scripts/build-local.sh'
      - '.github/actions/setup-build-env/**'
      - '.github/workflows/build-hymofs-lkm.yml'
      - '.github/workflows/hymofs-lkm.yml'
      - '.github/workflows/build.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-hymofs-lkm:
    uses: ./.github/workflows/build-hymofs-lkm.yml
    secrets: inherit

  build:
    needs: build-hymofs-lkm
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Shared Build Environment
        uses: ./.github/actions/setup-build-env
        with:
          ndk-version: r29
          rust-targets: aarch64-linux-android

      - name: Build All
        env:
          HYBRID_MOUNT_KP_DIR: /tmp/apatch-kpm
          HYBRID_MOUNT_HYMOFS_LKM_DIR: ${{ github.workspace }}/hymofs_lkm_artifacts
          HYBRID_MOUNT_NOTIFY: ${{ github.event_name != 'pull_request' && '1' || '0' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          export ANDROID_NDK_LATEST_HOME="${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_ROOT}"
          ls -la "$HYBRID_MOUNT_HYMOFS_LKM_DIR"
          cargo xtask build --ci

      - name: Detect Version and Name
        run: |
          ZIP_PATH=$(ls output/*.zip | head -n 1)
          ZIP_FILENAME=$(basename "$ZIP_PATH")
          ARTIFACT_NAME="${ZIP_FILENAME%.*}"
          VERSION="${ARTIFACT_NAME#Hybrid-Mount-}"
          
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV
          echo "BUILD_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Prepare Artifact
        run: |
          mkdir -p output/artifact_content
          unzip output/*.zip -d output/artifact_content
          rm output/*.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: output/artifact_content
